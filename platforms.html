<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visnec Platforms</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <h1>🚀 Visnec Platforms</h1>
  <div class="grid" id="platformList"></div>

  <script>
    fetch('platforms.json')
      .then(res => {
        if (!res.ok) throw new Error('Failed to fetch platforms.json');
        return res.json();
      })
      .then(platforms => {
        const list = document.getElementById('platformList');
        platforms.forEach(platform => {
          const div = document.createElement('div');
          div.className = 'tool';

          div.innerHTML = `
            <h3>${platform.emoji} ${platform.name}</h3>
            <p>${platform.description}</p>
            <p><strong>Status:</strong> <span class="${platform.status === 'live' ? 'featured' : 'coming'}">${platform.status}</span></p>
            <div class="tags">${platform.tags?.map(tag => `<span class="badge">${tag}</span>`).join(' ')}</div>
            <a href="${platform.url}" target="_blank">Visit Platform</a>
          `;

          list.appendChild(div);
        });
      })
      .catch(error => {
        document.getElementById('platformList').innerHTML =
          `<p style="color: red;">⚠️ Failed to load platforms.</p>`;
        console.error('Error loading platforms:', error);
      });
  </script>
</body>
</html>
