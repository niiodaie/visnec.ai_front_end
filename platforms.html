 <script>
  fetch('platforms.json')
    .then(res => {
      if (!res.ok) throw new Error('Failed to fetch platforms.json');
      return res.json();
    })
    .then(platforms => {
      const grid = document.querySelector('.grid');
      platforms.forEach(platform => {
        const card = document.createElement('div');
        card.className = 'tool';
        card.innerHTML = `
          <h3>${platform.emoji} ${platform.name}</h3>
          <p>${platform.description}</p>
          <p><strong>Status:</strong> <span class="${platform.status === 'live' ? 'featured' : 'coming'}">${platform.status}</span></p>
          <div class="tags">${platform.tags?.map(tag => `<span class="badge">${tag}</span>`).join(' ')}</div>
          <a href="${platform.url}" target="_blank">Visit Platform</a>
        `;
        grid.appendChild(card);
      });
    })
    .catch(err => {
      document.querySelector('.grid').innerHTML =
        `<p style="color:red;">⚠️ Could not load platforms.json</p>`;
      console.error(err);
    });
</script>
